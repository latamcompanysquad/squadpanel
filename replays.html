<script>
// ═══════════════════════════════════════════════════════════════════
// REPLAY ENGINE — paridad total con live map
// ═══════════════════════════════════════════════════════════════════

const SUPABASE_URL = 'https://vaddajsbjijtzibjhafj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhZGRhanNiamlqdHppYmpoYWZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTYxMzEsImV4cCI6MjA5Nzk3MjEzMX0.Wf6bqF-HuCA3DGu_YGhN-NzbDRTBKIt_YTkyvTRb-Eg';
const WORKER_URL = 'https://squadpanel-worker.latamcompanysquad.workers.dev';
let rVehicleIconMap = {};
let rVehicleIconMapNorm = {};
let rVehicleTypeMap = {};
let rDetailedVehicleMap = {};
let rNameToTypeIndex = {};
let rNameToTypeNormIndex = {};

function findByPrefix(searchStr, detailedMap) {
  const norm = normalizeVehicleKey(searchStr);
  if (!norm || norm.length < 3) return null;
  for (const [key, val] of Object.entries(detailedMap)) {
    if (!val.type) continue;
    const keyNorm = normalizeVehicleKey(key);
    if (norm.startsWith(keyNorm.substring(0, Math.min(5, keyNorm.length))) || 
        keyNorm.startsWith(norm.substring(0, Math.min(5, norm.length)))) {
      return val.type;
    }
  }
  return null;
}

function parseBlueprintName(rawName) {
  if (!rawName || !rawName.startsWith('BP_')) return rawName;
  return rawName
    .replace(/^BP_/, '')
    .replace(/_\d+$/, '')
    .replace(/_(Desert|Woodland|Snow|Arid|Green|Urban|Jungle)(_C)?$/i, '')
    .replace(/_C$/i, '');
}

function inferVehicleType(vehicleName) {
  if (!vehicleName) {
    console.log('[INFER-TYPE] vehicleName vacio/null');
    return undefined;
  }
  if (!rDetailedVehicleMap || Object.keys(rDetailedVehicleMap).length === 0) {
    console.log('[INFER-TYPE] rDetailedVehicleMap no cargado');
    return undefined;
  }
  
  let searchName = vehicleName;
  if (vehicleName.startsWith('BP_')) {
    searchName = parseBlueprintName(vehicleName);
    console.log('[INFER-TYPE] Blueprint parseado:', vehicleName, '→', searchName);
  }
  
  // 1. Exact match
  const entry = rDetailedVehicleMap[searchName];
  if (entry && entry.type) {
    console.log('[INFER-TYPE] ✓ EXACTO:', searchName, '→', entry.type);
    return entry.type;
  }
  
  // 2. Normalized match en índice
  const norm = normalizeVehicleKey(searchName);
  const typeFromNorm = rNameToTypeNormIndex[norm];
  if (typeFromNorm) {
    console.log('[INFER-TYPE] ✓ NORM-IDX:', norm, '→', typeFromNorm);
    return typeFromNorm;
  }
  
  // 3. Buscar por prefijo
  const typeFromPrefix = findByPrefix(searchName, rDetailedVehicleMap);
  if (typeFromPrefix) {
    console.log('[INFER-TYPE] ✓ PREFIX:', searchName, '→', typeFromPrefix);
    return typeFromPrefix;
  }
  
  // 4. Heurístico por palabras clave
  const heuristic = inferTypeFromKeywords(searchName);
  if (heuristic) {
    console.log('[INFER-TYPE] ✓ HEURISTIC:', searchName, '→', heuristic);
    return heuristic;
  }
  
  console.log('[INFER-TYPE] ✗ NO ENCONTRADO:', vehicleName, '(parsed:', searchName, ')');
  return undefined;
}

function inferTypeFromKeywords(name) {
  const lower = (name || '').toLowerCase();
  
  // Logistics/Utility
  if (lower.includes('logi') || lower.includes('supply')) return 'LOGI';
  
  // Transport/Trucks
  if (lower.includes('transport') || lower.includes('truck')) return 'TRAN';
  
  // Helicopters
  if (lower.includes('helo') || lower.includes('helicopter') || lower.includes('raven') || lower.includes('black hawk') || lower.includes('huey')) return 'UH';
  if (lower.includes('attack') || lower.includes('apache')) return 'AH';
  
  // Vehicles by size/type
  if (lower.includes('mrap') || lower.includes('humvee') || lower.includes('hmmwv')) return 'MRAP';
  if (lower.includes('jeep') || lower.includes('atv')) return 'ULTV';
  if (lower.includes('apc') || lower.includes('mtlb')) return 'APC';
  if (lower.includes('ifv') || lower.includes('bmp')) return 'IFV';
  if (lower.includes('tank') || lower.includes('t-') || lower.includes('m48')) return 'MBT';
  
  // Weapons/Artillery
  if (lower.includes('mortar') || lower.includes('grad') || lower.includes('himars')) return 'SPA';
  if (lower.includes('zu-') || lower.includes('zu23')) return 'SPAA';
  
  return null;
}

fetch('vehicle_icon_mapping.json').then(r => r.json()).then(d => { 
  rVehicleIconMap = d.vehicles_with_named_icons || {}; 
  rVehicleTypeMap = d.vehicle_type_mapping || {};
  rDetailedVehicleMap = d.detailed_vehicle_mapping || {};
  
  // Construir índice normalizado para búsquedas rápidas
  rNameToTypeIndex = {};
  rNameToTypeNormIndex = {};
  for (const [name, info] of Object.entries(rDetailedVehicleMap)) {
    if (info.type) {
      rNameToTypeIndex[name] = info.type;
      const norm = normalizeVehicleKey(name);
      if (!rNameToTypeNormIndex[norm]) {
        rNameToTypeNormIndex[norm] = info.type;
      }
    }
  }
  
  rVehicleIconMapNorm = buildNormalizedIconIndex(rVehicleIconMap);
  console.log('[REPLAY] Icon map loaded:', Object.keys(rVehicleIconMap).length, 'vehicles, types:', Object.keys(rVehicleTypeMap).length, 'detailed:', Object.keys(rDetailedVehicleMap).length, 'norm-idx:', Object.keys(rNameToTypeNormIndex).length);
}).catch(e => console.warn('Icon map load failed:', e));

function normalizeVehicleKey(str) {
  if (!str) return '';
  return String(str).toLowerCase().replace(/[\s\-_.]+/g, '');
}

function buildNormalizedIconIndex(dict) {
  const idx = {};
  for (const key in dict) idx[normalizeVehicleKey(key)] = dict[key];
  return idx;
}

function getRVehicleIcon(vehicleName, vehicleType) {
  if (!vehicleName) return 'public__img__markers__weapons__Mortar.webp';
  
  // Intenta match exacto
  if (rVehicleIconMap[vehicleName]) return rVehicleIconMap[vehicleName];
  
  // Intenta normalizado
  const norm = normalizeVehicleKey(vehicleName);
  if (rVehicleIconMapNorm[norm]) return rVehicleIconMapNorm[norm];
  
  // Usa tipo si existe
  if (vehicleType && rVehicleTypeMap[vehicleType]?.icon) {
    return rVehicleTypeMap[vehicleType].icon;
  }
  
  // Registrar como missing

  return 'public__img__markers__weapons__Mortar.webp';
}

// ── Helpers ──
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getMapKey(s) {
  if (!s) return null;
  const n = s.toLowerCase().replace(/[^a-z]/g,'');
  let best = null;
  for (const k of Object.keys(MAP_CORNERS)) {
    if (n.includes(k) && (!best || k.length > best.length)) best = k;
  }
  return best;
}

function gameToLatLng(pos, corn) {
  const fx = (pos.x - corn.minX) / (corn.maxX - corn.minX);
  const fy = (pos.y - corn.minY) / (corn.maxY - corn.minY);
  return [(1 - fy) * MAP_UNITS, fx * MAP_UNITS];
}

function getCorn(snap) {
  if (snap.cornerZero && snap.cornerOne) {
    return {
      minX: Math.min(snap.cornerZero.x, snap.cornerOne.x),
      maxX: Math.max(snap.cornerZero.x, snap.cornerOne.x),
      minY: Math.min(snap.cornerZero.y, snap.cornerOne.y),
      maxY: Math.max(snap.cornerZero.y, snap.cornerOne.y),
    };
  }
  const k = getMapKey(snap.layer || snap.map);
  const c = MAP_CORNERS[k];
  if (!c) return null;
  return { minX:Math.min(c.c0[0],c.c1[0]), maxX:Math.max(c.c0[0],c.c1[0]), minY:Math.min(c.c0[1],c.c1[1]), maxY:Math.max(c.c0[1],c.c1[1]) };
}

function metersToMapUnits(m, corn) {
  return Math.abs(m / Math.abs(corn.maxX - corn.minX)) * MAP_UNITS;
}

// ── Role icons (copied from script.js) ──
function roleIconName(p) {
  const r = (p.role||'').toLowerCase();
  if (p.isLeader) {
    if (r.includes('sl_crewman')||r.includes('slcrewman')) return 'crewman_squadleader';
    if (r.includes('sl_pilot')||r.includes('slpilot'))    return 'pilot_squadleader';
    return 'squadleader';
  }
  if (r.includes('automaticrifleman_optic')) return 'automaticrifleman_optic';
  if (r.includes('automaticrifleman')||r.includes('autorifleman')||r.includes('automatic_rifleman')) return 'automaticrifleman';
  if (r.includes('crewman'))          return 'crewman';
  if (r.includes('designatedmarksman')||r.includes('marksman')) return 'designatedmarksman';
  if (r.includes('heavyantitank')||r.includes('heavy_at')||r.includes('hat')) return 'heavyantitank';
  if (r.includes('lightantitank')||r.includes('light_at')||r.includes('lat')) return 'lightantitank';
  if (r.includes('machinegunner'))    return 'machinegunner';
  if (r.includes('medic'))            return 'medic';
  if (r.includes('pilot'))            return 'pilot';
  if (r.includes('raider'))           return 'raider';
  if (r.includes('recruit')||r.includes('plain')||r.includes('unarmed')) return 'recruit';
  if (r.includes('rifleman_scoped')||r.includes('rifleman2')||r.includes('rifleman_02')||r.includes('rifleman_03')) return 'rifleman_scoped';
  if (r.includes('rifleman'))         return 'rifleman';
  if (r.includes('sapper'))           return 'sapper';
  if (r.includes('scout'))            return 'scout';
  if (r.includes('sniper'))           return 'sniper';
  if (r.includes('grenadier'))        return 'grenadier';
  if (r.includes('engineer'))         return 'engineer';
  return 'rifleman';
}

function roleIconPath(p, variant) {

// ── HUD update ──
function rUpdateHUD(snap) {
  // Map name
  const raw = snap.layer || snap.map || '';
  const label = raw.includes('/') ? raw.split('/').filter(Boolean).pop().replace(/_/g,' ') : raw;
  document.getElementById('rHudMap').textContent = label || '—';
  document.getElementById('rLiveDot').className = 'live-dot offline'; // replay is never "live"

  // Tickets
  const t1 = snap.tickets?.team1, t2 = snap.tickets?.team2;
  const tickEl = document.getElementById('rHudTickets');
  if (t1 != null && t2 != null) {
    tickEl.style.display = 'flex';
    const parseFac = (raw) => {
      if (!raw) return null;
      const s = typeof raw === 'object' ? (raw.faction ?? raw.name ?? null) : raw;
      if (!s) return null;
      if (s.includes('/')) {
        const segs = s.split('/').filter(Boolean);
        for (const seg of segs) if (Object.values(FACTION_CODE).includes(seg)) return seg;
        const idx2 = segs.indexOf('FactionSetups');
        if (idx2 !== -1 && segs[idx2+1]) return segs[idx2+1];
      }
      return FACTION_CODE[s] ?? s;
    };
    const f1 = parseFac(snap.factions?.team1);
    const f2 = parseFac(snap.factions?.team2);
    document.getElementById('rt1faction').textContent = f1 || '—';
    document.getElementById('rt2faction').textContent = f2 || '—';
    const BASE = 'https://raw.githubusercontent.com/latamcompanysquad/squadpanel/main/resources';
    const fl1 = document.getElementById('rt1flag'), fl2 = document.getElementById('rt2flag');
    if (f1) { fl1.src=`${BASE}/public__img__flags__${f1}.webp`; fl1.style.display='inline-block'; } else fl1.style.display='none';
    if (f2) { fl2.src=`${BASE}/public__img__flags__${f2}.webp`; fl2.style.display='inline-block'; } else fl2.style.display='none';
    const total = (t1+t2) || 1;
    document.getElementById('rt1num').textContent = t1;
    document.getElementById('rt2num').textContent = t2;
    document.getElementById('rt1bar').style.width = (t1/total*100)+'%';
    document.getElementById('rt2bar').style.width = (t2/total*100)+'%';
  } else {
    tickEl.style.display = 'none';
  }

  // Timer
  if (snap.matchTimer != null && snap.matchTimer > 0) {
    const m = Math.floor(snap.matchTimer/60), s = snap.matchTimer%60;
    document.getElementById('rTimerVal').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    document.getElementById('rHudTimer').style.display = 'inline-block';
  } else {
    document.getElementById('rHudTimer').style.display = 'none';
  }
}

  rBasemap = L.imageOverlay(`./maps/${key}.webp`, bounds, { opacity:1 }).addTo(rMap);

// ── Objectives ──
function rUpdateObjectives(objectives, corn) {
  const seen = new Set();
  const flags = objectives.filter(o => o.position && !isMain(o)).map(o => gameToLatLng(o.position, corn));
  if (rFilters.flags && flags.length >= 2) {
    if (rObjectiveLine) { rObjectiveLine.setLatLngs(flags); if (!rMap.hasLayer(rObjectiveLine)) rMap.addLayer(rObjectiveLine); }
    else rObjectiveLine = L.polyline(flags, { color:'#fff', weight:1.5, opacity:.7, dashArray:'6,6' }).addTo(rMap);
  } else if (rObjectiveLine) { rMap.removeLayer(rObjectiveLine); rObjectiveLine = null; }

  for (const o of objectives) {
    if (!o.position || !o.name) continue;
    const main = isMain(o);
    if (!main && !rFilters.flags) continue;
    const key = `${o.name}_t${parseInt(o.owningTeam,10)}`;
    seen.add(key);
    const ll = gameToLatLng(o.position, corn);
    const icon = makeObjIcon(o.owningTeam, main);
    if (rObjectiveMarkers[key]) {
      rObjectiveMarkers[key].setLatLng(ll).setIcon(icon);
      if (!rMap.hasLayer(rObjectiveMarkers[key])) rMap.addLayer(rObjectiveMarkers[key]);
    } else {
      const m = L.marker(ll, { icon }).addTo(rMap);
      m.bindTooltip(esc(o.name), { permanent:true, direction:'top', offset:[0,-30], className:'obj-label' });
      rObjectiveMarkers[key] = m;
    }
  }
  for (const key of Object.keys(rObjectiveMarkers)) {
    if (!seen.has(key)) { rMap.removeLayer(rObjectiveMarkers[key]); delete rObjectiveMarkers[key]; }
  }
}

// ── Markers ──
function rGroupByVehicle(players) {
  const groups = {}, solo = [];
  for (const p of players) {
    if (!p.vehicle) { solo.push(p); continue; }
    const key = p.vehicle.id ? `veh_${p.vehicle.id}` : `veh_${p.vehicle.name}_${p.teamID}`;
    if (!groups[key]) {
      groups[key] = { vehicleId:p.vehicle.id||key, vehicleName:p.vehicle.name||'Vehículo', vehicleType:p.vehicle.type||inferVehicleType(p.vehicle.name), teamID:p.teamID, occupants:[], position:null, icon:null };
    }
    groups[key].occupants.push(p);
    if (!groups[key].position && p.position) groups[key].position = p.position;
  }
  return { vehicleGroups: Object.values(groups), individualPlayers: solo };
}

// Logging para debug de iconos
function logVehicleDebug(groups) {
  groups.forEach((g, i) => console.log(`[REPLAY] Veh ${i}: ${g.vehicleName} (T${g.teamID}) - icon: ${g.icon}`));
}

function rUpdateMarkers(snap, corn) {
  const players   = snap.players   || [];
  const seen = new Set();
  const { vehicleGroups, individualPlayers } = rGroupByVehicle(players);

  // vehicles
  for (const g of vehicleGroups) {
    if (!g.position) continue;
    if (!rFilters.veh) continue;
    if (!rFilters.t1 && g.teamID===1) continue;
    if (!rFilters.t2 && g.teamID===2) continue;
    const key = `veh_${g.vehicleId}`;
    seen.add(key);
    const ll = gameToLatLng(g.position, corn);
    const isSel = g.occupants.some(p=>p.steamID===rSelectedSteamID);
    if (!g.icon) g.icon = getRVehicleIcon(g.vehicleName, g.vehicleType);
    const icon = makeVehicleIcon(g, isSel);
    if (rMarkers[key]) { rMarkers[key].setLatLng(ll).setIcon(icon); }
    else { rMarkers[key] = L.marker(ll,{icon}).addTo(rMap); }
    const m = rMarkers[key];
    m._gData = g;
    m.unbindTooltip();
    m.bindTooltip(`<div style="font-weight:600;color:var(--amber);">🚗 ${esc(g.vehicleName)}</div><div style="color:var(--text-dim);">[T${g.teamID}] · ${g.occupants.length} ocupantes</div>`, {permanent:false,direction:'top',offset:[0,-14],className:'squad-tip'});
    m.off('click'); m.on('click', ()=>rSelectVehicle(g));
  }

  // solo players
  for (const p of individualPlayers) {
    if (!p.position) continue;
    if (!rFilters.t1 && p.teamID===1) continue;
    if (!rFilters.t2 && p.teamID===2) continue;
    if (!rFilters.dead && !p.isAlive) continue;
    const key = `player_${p.steamID}`;
    seen.add(key);
    const ll = gameToLatLng(p.position, corn);
    const isSel = p.steamID === rSelectedSteamID;
    const icon = makeIcon(p, isSel);
    if (rMarkers[key]) { rMarkers[key].setLatLng(ll).setIcon(icon); }
    else { rMarkers[key] = L.marker(ll,{icon}).addTo(rMap); }
    const m = rMarkers[key];
    m._pData = p;
    m.unbindTooltip();
    m.bindTooltip(makeTooltipContent(p), { permanent:isSel, direction:'top', offset:[0,-14], className:'squad-tip' });
    m.off('click'); m.on('click', ()=>rSelectPlayer(p));
  }

  // remove stale
  for (const id of Object.keys(rMarkers)) {
    if (!seen.has(id)) { rMap.removeLayer(rMarkers[id]); delete rMarkers[id]; }
  }

  // follow
  if (rFollowSelected && rSelectedSteamID) {
    for (const m of Object.values(rMarkers)) {
      if ((m._pData && m._pData.steamID===rSelectedSteamID) ||
          (m._gData && m._gData.occupants && m._gData.occupants.some(p=>p.steamID===rSelectedSteamID))) {
        rMap.panTo(m.getLatLng(), {animate:true,duration:.4}); break;
      }
    }
  }
}

// ── Player list (collapsible by squad, like live) ──
function rUpdatePlayerList(players) {
  rAllPlayersCache = [...players].sort((a,b)=>{
    if(a.teamID!==b.teamID) return a.teamID-b.teamID;
    return a.name.localeCompare(b.name);
  });
  const sorted = [...players].filter(p=>{
    if(!rFilters.t1&&p.teamID===1) return false;
    if(!rFilters.t2&&p.teamID===2) return false;
    return true;
  }).sort((a,b)=>{
    if(a.teamID!==b.teamID) return a.teamID-b.teamID;
    const as=a.squadID??999, bs=b.squadID??999;
    if(as!==bs) return as-bs;
    if(a.isLeader!==b.isLeader) return a.isLeader?-1:1;
    return a.name.localeCompare(b.name);
  });

  let html='', curTeam=null, curSquad=null;
  for (let i=0;i<sorted.length;i++) {
    const p=sorted[i];
    if(p.teamID!==curTeam){ curTeam=p.teamID; curSquad=null; html+=`<div class="panel-title" style="margin-top:10px;color:var(--${p.teamID===1?'blue':'red'});">Team ${p.teamID}</div>`; }
    if(p.squadID!==curSquad||p.teamID!==curTeam){
      curSquad=p.squadID;
      if(p.squadID!=null){
        const sk=`${curTeam}_${p.squadID}`;
        const exp=rExpandedSquads[sk]===true;
        const cnt=sorted.filter(x=>x.teamID===curTeam&&x.squadID===p.squadID).length;
        let sqName=`Squad ${p.squadID}`;
        if(p.squadName&&!p.squadName.startsWith('Squad ')) sqName=`Squad ${p.squadID} - ${p.squadName}`;
        html+=`<div class="squad-header" onclick="event.stopPropagation();rToggleSquad('${sk}')"><span class="squad-chevron">${exp?'▼':'▶'}</span><span class="squad-name">${esc(sqName)}</span><span class="squad-count">${cnt}</span></div>`;
        if(!exp){while(i+1<sorted.length&&sorted[i+1].teamID===curTeam&&sorted[i+1].squadID===curSquad)i++;continue;}
      } else {
        html+=`<div style="font-family:'Oswald',sans-serif;font-size:12px;color:var(--text-dim);margin:6px 0 4px;">Sin escuadra</div>`;
      }
    }
    const c=p.teamID===1?'blue':'red';
    const sel=p.steamID===rSelectedSteamID?'border-color:var(--amber);':'';
    const dead=(!p.isAlive&&!p.position)?'opacity:.4;':'';
    const statusEmoji=p.isAlive?'🟢':(p.position?'🟡':'🔴');
    const sl=p.isLeader?'<span style="color:var(--amber)">★</span>':'';
    const role=roleIconName(p).replace(/_/g,' ');
    html+=`<div class="player-card" style="cursor:pointer;margin-left:8px;${sel}${dead}" onclick="rSelectPlayer(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div style="display:flex;align-items:center;gap:6px;">
        <img src="${roleIconPath(p,'white')}" style="width:16px;height:16px;flex-shrink:0;"/>
        <div><span class="ptag ${c}">[S${p.squadID??'?'}]</span>${sl} ${esc(p.name)} ${statusEmoji}</div>
      </div>
      <div style="font-size:9px;color:var(--text-dim);margin-top:2px">${role}</div>
    </div>`;
  }
  if(!html) html='<div class="no-data">No hay jugadores</div>';
  document.getElementById('rPlayerList').innerHTML = html;
  document.getElementById('rPlayerCount').textContent = players.filter(p=>p.position).length;
  document.getElementById('rTotalCount').textContent  = players.length;
}

let rFobLayer = null, rRallyLayer = null, rAmmoLayer = null;

function rGetDeployableIcon(type, teamID, active=true) {
  const tid = parseInt(teamID,10);
  let suf = tid===1?'BLUE':tid===2?'RED':'WHITE';
  if (!active) suf = 'WHITE';
  const base = type==='fob'?'MAP_FOB':type==='hab'?'MAP_HAB':type==='ammo'?'MAP_AMMOCRATE':'MAP_RALLY';
  return `./resources/${base}_${suf}.svg`;
}

function rInitLayer(ref, name) {
  if (!ref) {
    if (name==='fob') {
      try { rMap.createPane('rFobsPane'); rMap.getPane('rFobsPane').style.zIndex=450; } catch(e){}
      rFobLayer = L.featureGroup({pane:'rFobsPane'}).addTo(rMap);
    } else if (name==='rally') {
      rRallyLayer = L.featureGroup().addTo(rMap);
    } else {
      rAmmoLayer = L.featureGroup().addTo(rMap);
    }
  } else {
    ref.clearLayers();
  }
}

function rClearLayers() {
  if (rFobLayer)   rFobLayer.clearLayers();
  if (rRallyLayer) rRallyLayer.clearLayers();
  if (rAmmoLayer)  rAmmoLayer.clearLayers();
}

function rRenderFob(fob, corn) {
  let tid = parseInt(fob.teamID,10);
  if (isNaN(tid)||(tid!==1&&tid!==2)) tid=1;
  const isHab   = fob.isHab===true;
  const isActive= fob.isActive!==false;
  const pos     = fob.pos||{x:0,y:0};
  const ll      = gameToLatLng(pos, corn);
  const habName = fob.habName||(isHab?`HAB${tid}`:`FOB${tid}`);
  const constructR = fob.construct_radius||15000;
  const exclusionR = fob.exclusion_radius||30000;

  if (!isHab) {
    const cols = tid===1?{ex:'#2a7ab0',co:'#4fa6e8'}:{ex:'#b33a30',co:'#e0584f'};
    const xRange = Math.abs(corn.maxX-corn.minX);
    const toU = m => Math.abs(m/xRange)*MAP_UNITS;
    L.circle(ll,{radius:toU(exclusionR),color:cols.ex,weight:2.5,fillOpacity:.03,dashArray:'4,5'}).addTo(rFobLayer);
    L.circle(ll,{radius:toU(constructR),color:cols.co,weight:2.5,fillOpacity:.05}).addTo(rFobLayer);
  }
  const iconType = isHab?'hab':'fob';
  const iconUrl  = rGetDeployableIcon(iconType, tid, isActive);
  const sz = isHab?30:24;
  const xOver = isHab&&!isActive?`<div style="position:absolute;top:-6px;right:-6px;font-size:16px;color:#ff0000;font-weight:bold;text-shadow:0 0 3px #000;line-height:1;">✕</div>`:'';
  const html = `<div style="position:relative;width:${sz}px;height:${sz}px;"><img src="${iconUrl}" style="width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 2px rgba(0,0,0,.6));"/>${xOver}</div>`;
  const icon = L.divIcon({html,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],className:'fob-icon'});
  const m = L.marker(ll,{icon}).addTo(rFobLayer);
  const statusTxt = isHab?(isActive?'🟢 Activo':'🔴 Inactivo'):'';
  m.bindTooltip(`<strong>${esc(habName)}</strong><br/>Team ${tid}${isHab?'<br/>'+statusTxt:''}`,{className:'squad-tip',direction:'top'});
}

function rRenderRally(rally, corn) {
  let tid = parseInt(rally.teamID,10);
  if (isNaN(tid)||(tid!==1&&tid!==2)) tid=1;
  const ll  = gameToLatLng(rally.pos||{x:0,y:0}, corn);
  const url = rGetDeployableIcon('rally',tid,true);
  const html= `<img src="${url}" style="width:24px;height:24px;filter:drop-shadow(0 0 2px rgba(0,0,0,.6));"/>`;
  const icon= L.divIcon({html,iconSize:[24,24],iconAnchor:[12,12],className:'rally-icon'});
  L.marker(ll,{icon}).addTo(rRallyLayer)
    .bindTooltip(`Squad ${rally.squadID||'?'} Rally (T${tid})`,{className:'squad-tip',direction:'top'});
}

function rRenderAmmo(ammo, corn) {
  let tid = parseInt(ammo.teamID,10);
  if (isNaN(tid)||(tid!==1&&tid!==2)) tid=1;
  const isBuilt = (ammo.state||'Completed')==='Completed';
  const ll  = gameToLatLng(ammo.pos||{x:0,y:0}, corn);
  const url = rGetDeployableIcon('ammo',tid,true);
  const html= `<img src="${url}" style="width:24px;height:24px;filter:drop-shadow(0 0 2px rgba(0,0,0,.6));${!isBuilt?'opacity:.5;':''}"/>`;
  const icon= L.divIcon({html,iconSize:[24,24],iconAnchor:[12,12],className:'ammo-icon'});
  L.marker(ll,{icon}).addTo(rAmmoLayer)
    .bindTooltip(`Ammo T${tid} ${isBuilt?'✅':'🚧'}`,{className:'squad-tip',direction:'top'});
}

function rUpdateDeployables(snap, corn) {
  // init/clear layers
  rInitLayer(rFobLayer,'fob');   rFobLayer   = rFobLayer   || L.featureGroup().addTo(rMap);
  rInitLayer(rRallyLayer,'rally'); rRallyLayer = rRallyLayer || L.featureGroup().addTo(rMap);
  rInitLayer(rAmmoLayer,'ammo');  rAmmoLayer  = rAmmoLayer  || L.featureGroup().addTo(rMap);

  if (snap.fobs?.length)        snap.fobs.forEach(f=>{ try{rRenderFob(f,corn);}catch(e){} });
  if (snap.rallyPoints?.length) snap.rallyPoints.forEach(r=>{ try{rRenderRally(r,corn);}catch(e){} });
  if (snap.ammocrates?.length)  snap.ammocrates.forEach(a=>{ try{rRenderAmmo(a,corn);}catch(e){} });
}

// ── Render snapshot ──
function rRender(i) {
  if (!rSnapshots[i]) return;
  rIdx = i;
  const snap = rSnapshots[i];
  rLoadMap(snap.layer || snap.map);
  const corn = getCorn(snap);
  if (!corn) return;

  rUpdateHUD(snap);
  if (snap.objectives && snap.objectives.length) rUpdateObjectives(snap.objectives, corn);
  rUpdateMarkers(snap, corn);
  rUpdateDeployables(snap, corn);
  if (snap.players) rUpdatePlayerList(snap.players);

  // status text
  document.getElementById('rStatusText').textContent = `Snap ${i+1}/${rSnapshots.length}`;
  // scrubber
  document.getElementById('rTimeline').value = i;

  // ── Tiempo real basado en timestamp ──
  const firstTs = rSnapshots[0].timestamp || new Date(rSnapshots[0].created_at).getTime();
  const currentTs = snap.timestamp || new Date(snap.created_at).getTime();
  const elapsed = (currentTs - firstTs) / 1000;
  const lastSnap = rSnapshots[rSnapshots.length-1];
  const totalTs = lastSnap.timestamp || new Date(lastSnap.created_at).getTime();
  const totalDuration = (totalTs - firstTs) / 1000;

  const fmt = (s) => {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  };

  document.getElementById('rSnapInfo').textContent = `[${i+1}/${rSnapshots.length}] ⏱ ${fmt(elapsed)} / ${fmt(totalDuration)}`;
  //document.getElementById('rTimeInfo').textContent = `[${fmt(elapsed)}]`;
  document.getElementById('rPlayBtn').textContent = rPlaying ? '⏸' : '▶';

  if (i===0) rMap.fitBounds(bounds);
}

// ── Playback ──
function rPlay() {
  if (!rSnapshots.length) return;
  rPlaying = !rPlaying;
  if (rPlaying) {
    const speed = parseFloat(document.getElementById('rSpeed').value) || 1;
    // Usamos setTimeout recursivo para recalcular en cada paso
    const tick = () => {
      if (!rPlaying) return;
      if (rIdx + 1 < rSnapshots.length) {
        const cur = rSnapshots[rIdx].timestamp || new Date(rSnapshots[rIdx].created_at).getTime();
        const next = rSnapshots[rIdx+1].timestamp || new Date(rSnapshots[rIdx+1].created_at).getTime();
        const delta = next - cur;
        const delay = delta > 0 ? Math.max(50, delta / speed) : 2000 / speed;
        rTimer = setTimeout(() => {
          if (rIdx < rSnapshots.length-1) {
            rRender(++rIdx);
            tick();
          } else {
            rPlaying = false;
            rRender(rIdx);
            document.getElementById('rPlayBtn').textContent = '▶';
          }
        }, delay);
      } else {
        rPlaying = false;
        rRender(rIdx);
        document.getElementById('rPlayBtn').textContent = '▶';
      }
    };
    tick();
  } else {
    clearInterval(rTimer);
    rTimer = null;
  }
  document.getElementById('rPlayBtn').textContent = rPlaying ? '⏸' : '▶';
}

function rSeek(delta) {
  rPlaying = false;
  clearInterval(rTimer);
  rTimer = null;
  rRender(Math.max(0, Math.min(rIdx + delta, rSnapshots.length - 1)));
}

function rOnScrub(val) {
  rPlaying = false;
  clearInterval(rTimer);
  rTimer = null;
  rRender(parseInt(val));
}

function rOnSpeedChange() {
  if (rPlaying) {
    clearInterval(rTimer);
    rTimer = null;
    rPlay();
  }
}

// ── Load matches ──
async function rLoadMatches() {
  document.getElementById('rMatchList').innerHTML = '<div class="no-data">Cargando...</div>';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/match_metadata?order=start_time.desc&limit=50`,
      { headers:{ 'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}` }});
    const matches = await res.json();
    document.getElementById('rMatchList').innerHTML = (matches||[]).map(m=>
      `<div class="match-item" id="mi_${m.match_id}" onclick="rSelectMatch('${m.match_id}')" style="display:flex;justify-content:space-between;align-items:center;">
        <div onclick="event.stopPropagation();">
          <div class="match-title">${esc(m.map_name||'?')} — ${esc(m.layer_name||'?')}</div>
          <div class="match-meta">${new Date(m.start_time).toLocaleString()} | ${m.snapshot_count} snaps</div>
        </div>
        <button class="delete-match-btn" onclick="rDeleteMatch(event,'${m.match_id}')">🗑</button>
      </div>`).join('') || '<div class="no-data">Sin partidas</div>';
  } catch(e){ document.getElementById('rMatchList').innerHTML='<div class="no-data">Error cargando</div>'; }
}

async function rSelectMatch(id) {
  // mark active
  document.querySelectorAll('.match-item').forEach(el=>el.classList.remove('active'));
  const mi=document.getElementById('mi_'+id); if(mi) mi.classList.add('active');
  document.getElementById('rStatusText').textContent='Cargando...';
  try {
    // ── PAGINACIÓN OPTIMIZADA ──
    let allSnapshots = [];
    let offset = 0;
    const limit = 200; // Reducido de 1000 para no saturar
    let hasMore = true;
    let retries = 0;
    const maxRetries = 3;

    while (hasMore && retries < maxRetries) {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/match_snapshots?match_id=eq.${id}&order=snapshot_index.asc&limit=${limit}&offset=${offset}`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.length === 0) break;
        allSnapshots = allSnapshots.concat(data);
        offset += limit;
        hasMore = data.length === limit;
        retries = 0; // Reset retries en caso de éxito

        // Delay entre requests para no saturar
        if (hasMore) await new Promise(r => setTimeout(r, 200));
      } catch (e) {
        retries++;
        if (retries >= maxRetries) throw e;
        console.warn(`[REPLAY] Request falló, reintentando (${retries}/${maxRetries})...`);
        await new Promise(r => setTimeout(r, 500 * retries)); // Backoff exponencial
      }
    }
    rSnapshots = allSnapshots.map(s => s.data || s);
    rIdx = 0;
  rPlaying = false;
  clearInterval(rTimer);
  rTimer = null;
    document.getElementById('rTimeline').max = rSnapshots.length-1;
    // clear markers
    for(const id of Object.keys(rMarkers)){ rMap.removeLayer(rMarkers[id]); delete rMarkers[id]; }
    for(const id of Object.keys(rObjectiveMarkers)){ rMap.removeLayer(rObjectiveMarkers[id]); delete rObjectiveMarkers[id]; }
    if(rObjectiveLine){ rMap.removeLayer(rObjectiveLine); rObjectiveLine=null; }
    rClearLayers();
    rRender(0);
  } catch(e){ document.getElementById('rStatusText').textContent='Error'; }
}

async function rDeleteMatch(e, matchId) {
  if(!confirm(`Eliminar match ${matchId}? Se borrarán todos los datos asociados.`)) return;
  try {
    console.log('[DELETE] Iniciando eliminación de match:', matchId);
    if(!SUPABASE_URL || !SUPABASE_KEY) { alert('Error: Supabase no configurado'); console.error('[DELETE] SUPABASE_URL o SUPABASE_KEY faltando'); return; }
    const headers = { 'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}` };
    const tables = ['match_metadata','match_snapshots','kill_snapshots'];
    for(const table of tables) {
      const url = `${SUPABASE_URL}/rest/v1/${table}?match_id=eq.${matchId}`;
      console.log(`[DELETE] Eliminando de ${table}:`, url);
      const res = await fetch(url, { method:'DELETE', headers });
      if(!res.ok) { 
        const errText = await res.text();
        console.error(`[DELETE] Error en ${table}:`, res.status, errText); 
        throw new Error(`${table}: ${res.status} ${errText}`); 
      }
      console.log(`[DELETE] ${table}: OK`);
    }
    alert('Match eliminado ✓');
    console.log('[DELETE] Recargando matches...');
    rLoadMatches();
    document.getElementById('rStatusText').textContent='Match eliminado';
  } catch(e){ 
    console.error('[DELETE] Error completo:', e);
    alert('Error: '+e.message); 
  }
}

function rOpenMappingPanel() {

    return;
  }
  
  const types = ['TRAN','MRAP','LOGI','LTV','ULTV','APC','IFV','MBT','TD','MSV','SPA','SPAA','AH','UH','MGS','RSV'];
  let html = '<div style="margin-bottom:12px;color:var(--text-dim);">Vehículos sin mapear: ' + rMissingVehicles.size + '</div>';
  
  for (const vehName of Array.from(rMissingVehicles).sort()) {
    const mapped = rPendingMappings[vehName] || {};
    html += `
      <div style="border:1px solid var(--panel-edge);padding:10px;margin-bottom:8px;border-radius:3px;">
        <div style="color:var(--olive);margin-bottom:8px;word-break:break-all;">${esc(vehName)}</div>

          <input type="text" placeholder="Nombre legible (ej: US Utility Transport)" value="${esc(mapped.name||'')}" id="name_${esc(vehName)}" style="background:#0a0e08;border:1px solid var(--panel-edge);color:var(--text);padding:6px;border-radius:3px;font-family:inherit;"/>
          <select id="type_${esc(vehName)}" style="background:#0a0e08;border:1px solid var(--panel-edge);color:var(--text);padding:6px;border-radius:3px;font-family:inherit;">
            <option value="">-- Tipo --</option>
            ${types.map(t=>`<option value="${t}" ${mapped.type===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
    `;
  }
  
  content.innerHTML = html;
  
  // Captar cambios
  for (const vehName of rMissingVehicles) {
    document.getElementById(`name_${esc(vehName)}`).oninput = (e) => {
      if (!rPendingMappings[vehName]) rPendingMappings[vehName] = {};
      rPendingMappings[vehName].name = e.target.value;
      rSaveMappingsToStorage();
    };
    document.getElementById(`type_${esc(vehName)}`).onchange = (e) => {
      if (!rPendingMappings[vehName]) rPendingMappings[vehName] = {};
      rPendingMappings[vehName].type = e.target.value;
      rSaveMappingsToStorage();
    };
  }
  
  modal.style.display = 'flex';
}

}

function rLoadMappingsFromStorage() {
  const stored = localStorage.getItem('rPendingMappings');

    try {
      rPendingMappings = JSON.parse(stored);
    } catch (e) {
      console.warn('Failed to load mappings from storage:', e);

  }
}

async function rPushToGithub() {

  for (const [vehName, data] of Object.entries(rPendingMappings)) {

      validMappings[data.name] = { 
        type: data.type, 
        fallback_icon: rVehicleTypeMap[data.type]?.icon || 'public__img__icons__default__vehicles__map_truck_transport.svg' 
      };
    }

  if (Object.keys(validMappings).length === 0) {

    return;
  }
  
  pushBtn.disabled = true;
  pushBtn.textContent = '⏳ Enviando...';
  
  try {
    const res = await fetch(`${WORKER_URL}/api/push-vehicle-mappings`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mappings: validMappings })
    });
    
    const data = await res.json();
    if (data.success) {
      pushBtn.textContent = '✓ Guardado en GitHub';
      rPendingMappings = {};
      localStorage.removeItem('rPendingMappings');
      setTimeout(() => {
        alert('✓ Mappings pusheados a GitHub!\nRecarga para ver los cambios.');
        document.getElementById('rMappingModal').style.display = 'none';
        pushBtn.textContent = '📤 PUSH A GITHUB';
        pushBtn.disabled = false;
      }, 1500);
    } else {
      alert('❌ Error: ' + (data.error || 'desconocido'));
      pushBtn.textContent = '📤 PUSH A GITHUB';
      pushBtn.disabled = false;
    }
  } catch (e) {
    alert('❌ Error de conexión: ' + e.message);
    pushBtn.textContent = '📤 PUSH A GITHUB';
    pushBtn.disabled = false;
  }
}


// ── KILL REPLAY MODE ──
let killReplayTimer = null;
let killTracerProgress = 0;
let killTracerCtx = null;

function initKillReplay() {
  if (!killReplayMode || !killData) return;
  if (!rMap) { setTimeout(() => initKillReplay(), 100); return; }
  const container = document.getElementById('killReplayContainer');
  container.style.display = 'block';
  if (!container) {
    console.warn('[Kill Replay] Container not found in DOM');
    return;
  }
  document.getElementById('killAttacker').textContent = killData.attacker_name || '?';
  document.getElementById('killVictim').textContent = killData.victim_name || '?';
  document.getElementById('killWeapon').textContent = killData.weapon || 'Unknown';
  
  const canvas = document.getElementById('killTracerCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';
  killTracerCtx = canvas.getContext('2d');
  
  const killerPos = {x: parseFloat(killData.attacker_pos_x)||0, y: parseFloat(killData.attacker_pos_y)||0};
  const victimPos = {x: parseFloat(killData.victim_pos_x)||0, y: parseFloat(killData.victim_pos_y)||0};
  const centerX = (killerPos.x + victimPos.x)/2;
  const centerY = (killerPos.y + victimPos.y)/2;
  const distance = Math.sqrt(Math.pow(victimPos.x-killerPos.x,2)+Math.pow(victimPos.y-killerPos.y,2));
  const zoomLevel = Math.max(-2, Math.min(4, 2-Math.log2(distance/500)));
  
  rMap.setView([centerY,centerX], zoomLevel);
  rMap.invalidateSize();  
  
  L.circleMarker([killerPos.y,killerPos.x], {radius:8,color:'#ff6b6b',fill:true,fillColor:'#ff6b6b',fillOpacity:0.8,weight:2}).addTo(rMap).bindPopup(killData.attacker_name);
  L.circleMarker([victimPos.y,victimPos.x], {radius:8,color:'#4ecdc4',fill:true,fillColor:'#4ecdc4',fillOpacity:0.8,weight:2}).addTo(rMap).bindPopup(killData.victim_name);
  
  killTracerProgress = 0;
  const duration = 3000;
  const startTime = Date.now();
  
  const animateTracer = () => {
    const elapsed = Date.now()-startTime;
    killTracerProgress = Math.min(elapsed/duration, 1);
    const seconds = (elapsed/1000).toFixed(1);
    document.getElementById('killTimer').textContent = seconds+'s';
    killTracerCtx.clearRect(0,0,killTracerCtx.canvas.width,killTracerCtx.canvas.height);
    const killerScreen = rMap.latLngToContainerPoint([killerPos.y,killerPos.x]);
    const victimScreen = rMap.latLngToContainerPoint([victimPos.y,victimPos.x]);
    killTracerCtx.strokeStyle = `rgba(255,107,107,${1-killTracerProgress})`;
    killTracerCtx.lineWidth = 3;
    killTracerCtx.lineCap = 'round';
    killTracerCtx.lineJoin = 'round';
    killTracerCtx.beginPath();
    killTracerCtx.moveTo(killerScreen.x, killerScreen.y);
    killTracerCtx.lineTo(killerScreen.x+(victimScreen.x-killerScreen.x)*killTracerProgress, killerScreen.y+(victimScreen.y-killerScreen.y)*killTracerProgress);
    killTracerCtx.stroke();
    if(killTracerProgress>=0.9) {
      const pulse=(killTracerProgress-0.9)/0.1;
      killTracerCtx.strokeStyle = `rgba(78,205,196,${(1-pulse)*0.6})`;
      killTracerCtx.lineWidth = 1+pulse*4;
      killTracerCtx.beginPath();
      killTracerCtx.arc(victimScreen.x,victimScreen.y,20+pulse*30,0,Math.PI*2);
      killTracerCtx.stroke();
    }
    if(killTracerProgress<1) killReplayTimer = requestAnimationFrame(animateTracer);
    else {killTracerProgress=0; killReplayTimer=setTimeout(()=>animateTracer(),500);}
  };
  animateTracer();
}

function resetKillReplay() {
  if(killReplayTimer) {clearTimeout(killReplayTimer); cancelAnimationFrame(killReplayTimer);}
  initKillReplay();
}


// ── Init ──
window.onload = () => {
  rMap = L.map('map',{ crs:L.CRS.Simple, minZoom:-2, maxZoom:4, zoomSnap:.5, attributionControl:false, zoomControl:false });
  rMap.fitBounds(bounds);
  if (!killReplayMode) rLoadMatches();

  // deselect on map click
  rMap.on('click',()=>{
    if(rSelectedSteamID){
      rSelectedSteamID=null;
      document.getElementById('rPlayerPanel').innerHTML='<div class="no-data">Haz click en un marcador</div>';
      const snap=rSnapshots[rIdx]; if(snap){const corn=getCorn(snap);if(corn)rUpdateMarkers(snap,corn);}
    }
  });
  
  setTimeout(() => initKillReplay(), 800);
};
