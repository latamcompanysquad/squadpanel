<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Panel - SquadPanel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f0c; color: #e0e0e0; font-family: 'Oswald', sans-serif; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 2px solid #4caf50; padding-bottom: 16px; }
    .header h1 { color: #4caf50; font-size: 28px; }
    .header a { color: #2196f3; text-decoration: none; font-size: 12px; padding: 6px 12px; background: rgba(33,150,243,0.1); border-radius: 4px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab-btn { padding: 10px 16px; border: none; border-radius: 4px; font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.08); color: #ccc; }
    .tab-btn.active { background: #4caf50; color: white; }
    .content { display: none; }
    .content.active { display: block; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: linear-gradient(135deg, rgba(76,175,80,0.12) 0%, rgba(76,175,80,0.03) 100%); border: 1px solid #4caf50; border-radius: 6px; padding: 18px; }
    .stat-label { color: #90ee90; font-size: 11px; text-transform: uppercase; margin-bottom: 10px; }
    .stat-value { font-size: 36px; font-weight: 700; color: #4caf50; }
    .table-wrapper { background: rgba(0,0,0,0.4); border-radius: 6px; padding: 18px; border: 1px solid rgba(76,175,80,0.1); }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { background: rgba(76,175,80,0.15); padding: 12px; text-align: left; color: #4caf50; border-bottom: 2px solid #4caf50; }
    td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    tr:hover { background: rgba(76,175,80,0.05); }
    .search-box { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 4px; color: white; font-family: 'Oswald', sans-serif; font-size: 11px; margin-bottom: 16px; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 3px; font-size: 9px; font-weight: 600; }
    .badge-online { background: #4caf50; color: white; }
    .badge-offline { background: #555; }
    .log-item { background: rgba(0,0,0,0.2); border-left: 3px solid #2196f3; padding: 12px; margin-bottom: 10px; border-radius: 4px; font-size: 10px; }
    .log-rcon { border-left-color: #f44336; background: rgba(244,67,54,0.08); }
    .ip-cell { font-family: monospace; color: #4caf50; font-size: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚙️ CONTROL PANEL</h1>
      <a href="index.html">← Volver</a>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('resumen')">📊 RESUMEN</button>
      <button class="tab-btn" onclick="switchTab('usuarios')">👥 USUARIOS</button>
      <button class="tab-btn" onclick="switchTab('actividad')">📈 ACTIVIDAD</button>
      <button class="tab-btn" onclick="switchTab('rcon')">🔴 RCON LOG</button>
      <button class="tab-btn" onclick="switchTab('alertas')">⚠️ ALERTAS</button>
    </div>

    <div id="resumen" class="content active">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="table-wrapper">
        <h3 style="margin-bottom: 12px; color: #4caf50;">📝 Últimos Accesos</h3>
        <table id="recentTable">
          <thead><tr><th>USUARIO</th><th>HORA</th><th>IP</th><th>NAVEGADOR</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="usuarios" class="content">
      <input type="text" class="search-box" id="searchUsers" placeholder="🔍 Buscar usuario..." oninput="filterTable('usuarios')">
      <div class="table-wrapper">
        <table id="usersTable">
          <thead><tr><th>USUARIO</th><th>DISCORD ID</th><th>IP</th><th>NAVEGADOR</th><th>ÚLTIMO</th><th>ACCESOS</th><th>STATUS</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="actividad" class="content">
      <div id="activityLog" style="max-height: 700px; overflow-y: auto;"></div>
    </div>

    <div id="rcon" class="content">
      <input type="text" class="search-box" id="searchRcon" placeholder="🔍 Buscar RCON..." oninput="filterTable('rcon')">
      <div class="table-wrapper">
        <table id="rconTable">
          <thead><tr><th>HORA</th><th>USUARIO</th><th>COMANDO</th><th>RESULTADO</th><th>IP</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="alertas" class="content">
      <div id="alertsContainer"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="control-advanced.js"></script>
</body>
</html>
