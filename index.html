<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SquadPanel</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0d47a1, #1976d2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 800px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    h1 {
      margin-bottom: 16px;
      font-size: 3rem;
    }
    p {
      margin-bottom: 24px;
      font-size: 1.1rem;
      line-height: 1.6;
    }
    .button {
      display: inline-block;
      padding: 14px 28px;
      color: #0d47a1;
      background: #fff;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      transition: transform 0.2s ease;
    }
    .button:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bienvenido a SquadPanel</h1>
    <p>Una landing page simple para presentar tu aplicación. Aquí puedes mostrar tus características, valores y llamado a la acción de manera clara y moderna.</p>
    <a class="button" href="#">Comenzar</a>
  </div>
</body>
</html>
