<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LATAMCOMPANY // Live Tactical Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hud-block">
      <div class="brand"><span>LATAM</span>COMPANY</div>
      <div class="live-dot" id="liveDot"></div>
    </div>
    <div class="hud-block">
      <div class="map-name" id="mapName">-</div>
    </div>
    <div class="hud-block">
      <div class="tickets">
        <div class="ticket-bar">
          <div class="ticket-fill-blue" id="ticketFillBlue"></div>
        </div>
        <div class="ticket-num blue" id="ticketBlue">-</div>
        <span style="color:var(--text-dim);">vs</span>
        <div class="ticket-bar">
          <div class="ticket-fill-red" id="ticketFillRed"></div>
        </div>
        <div class="ticket-num red" id="ticketRed">-</div>
      </div>
    </div>
    <div class="status-text" id="statusText">Desconectado</div>
  </div>

  <div id="sideTabs">
    <div class="side-tab active" data-tab="map">Mapa</div>
    <div class="side-tab" data-tab="players">Jugadores</div>
    <div class="side-tab" data-tab="search">Búsqueda</div>
    <div class="side-tab" data-tab="admin">Admin</div>
  </div>

  <div id="body">
    <div id="mapwrap">
      <div id="map"></div>
      <div id="sweep"></div>
      <div id="filterPanel">
        <div class="filter-group">
          <div class="ftoggle t1 active" data-filter="t1">T1</div>
          <div class="ftoggle t2 active" data-filter="t2">T2</div>
          <div class="ftoggle veh active" data-filter="veh">Veh</div>
          <div class="ftoggle dead" data-filter="dead">Muertos</div>
          <div class="filter-sep"></div>
          <div class="ftoggle empty" data-filter="empty">Vacíos</div>
        </div>
      </div>
    </div>

    <div id="side">
      <div id="sideContent">
        <div id="tabMap">
          <div class="panel-title">Información</div>
          <div class="no-data">Esperando servidor...</div>
        </div>
        <div id="tabPlayers">
          <div class="panel-title">Jugadores Activos</div>
          <div id="playersList"></div>
        </div>
        <div id="tabSearch">
          <div class="panel-title">Búsqueda de Jugador</div>
          <div id="searchPanel">
            <input type="text" id="searchInput" placeholder="Nombre o SteamID...">
            <div id="searchDropdown"></div>
          </div>
        </div>
        <div id="tabAdmin">
          <div class="admin-section">
            <div class="panel-title">Control Admin</div>
            <div id="adminNoTarget" style="color:var(--text-dim);font-size:11px;text-align:center;padding:20px 0;">Selecciona un jugador</div>
            <div id="adminTargetInfo" style="display:none;">
              <div id="adminTarget">
                <div class="target-name" id="targetName">-</div>
                <div class="target-steam" id="targetSteam">-</div>
              </div>
              <div id="playerActionBtns">
                <div class="btn-grid">
                  <button class="btn btn-warn">Kick</button>
                  <button class="btn btn-ban">Ban</button>
                </div>
              </div>
            </div>
          </div>
          <div class="admin-section">
            <div class="panel-title">Log de Comandos</div>
            <div id="cmdLog"></div>
          </div>
          <div id="adminToast"></div>
        </div>
        <div id="playerPanel"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="script.js"></script>
</body>
</html>
