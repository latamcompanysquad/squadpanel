<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LATAMCOMPANY // Live Tactical Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f0c; --panel:#11160f; --panel-edge:#26301f;
  --olive:#7c8f55; --olive-dim:#4a5638; --amber:#d9a441;
  --text:#d8d9c9; --text-dim:#8a9080;
  --blue:#4fa6e8; --blue-dim:#1c3a52;
  --red:#e0584f;  --red-dim:#4a2220;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;height:100%;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;}

/* HUD */
#hud{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,#141a10,#0e120c);
  border-bottom:1px solid var(--panel-edge);
  padding:10px 18px;flex-shrink:0;gap:24px;
}
.hud-block{display:flex;align-items:center;gap:10px;}
.brand{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.08em;font-size:15px;color:var(--text);text-transform:uppercase;}
.brand span{color:var(--olive);}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);animation:blink 1.4s infinite;}
.live-dot.offline{background:var(--text-dim);box-shadow:none;animation:none;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
.map-name{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.05em;color:var(--amber);text-transform:uppercase;}
.tickets{display:flex;align-items:center;gap:10px;font-size:13px;}
.ticket-bar{width:160px;height:8px;background:var(--olive-dim);border-radius:2px;overflow:hidden;display:flex;border:1px solid var(--panel-edge);}
.ticket-fill-blue{background:var(--blue);height:100%;}
.ticket-fill-red{background:var(--red);height:100%;}
.ticket-num{font-weight:700;min-width:34px;text-align:center;}
.ticket-num.blue{color:var(--blue);}
.ticket-num.red{color:var(--red);}
.status-text{font-size:11px;color:var(--text-dim);}

/* BODY */
#body{flex:1;display:flex;min-height:0;}
#mapwrap{flex:1;position:relative;min-width:0;background:#05070a;}
#map{width:100%;height:100%;background:#05070a;}
#sweep{
  position:absolute;inset:0;pointer-events:none;z-index:500;
  background:conic-gradient(from 0deg,rgba(124,143,85,.12),transparent 35deg);
  mix-blend-mode:screen;animation:sweep 6s linear infinite;opacity:.5;
}
@keyframes sweep{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* SIDE PANEL */
#side{
  width:280px;flex-shrink:0;background:var(--panel);
  border-left:1px solid var(--panel-edge);
  display:flex;flex-direction:column;padding:16px;gap:14px;overflow-y:auto;
}
.panel-title{
  font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--olive);border-bottom:1px solid var(--panel-edge);
  padding-bottom:6px;margin-bottom:6px;
}
.player-card{
  border:1px solid var(--panel-edge);background:#0d120b;
  border-radius:3px;padding:10px;font-size:11px;line-height:1.8;
}
.player-card .pname{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;color:var(--text);}
.player-card .ptag{font-weight:700;}
.player-card .ptag.blue{color:var(--blue);}
.player-card .ptag.red{color:var(--red);}
.player-card .row{display:flex;justify-content:space-between;color:var(--text-dim);}
.player-card .val{color:var(--text);}
.no-data{color:var(--text-dim);font-size:11px;text-align:center;padding:20px 0;}

/* Leaflet marker overrides */
.leaflet-marker-icon{background:none;border:none;}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hud-block">
      <div class="live-dot offline" id="liveDot"></div>
      <div class="brand">LATAM<span>COMPANY</span></div>
      <div class="map-name" id="hudMap">—</div>
    </div>
    <div class="hud-block tickets" id="hudTickets" style="display:none">
      <span class="ticket-num blue" id="t1num">—</span>
      <div class="ticket-bar">
        <div class="ticket-fill-blue" id="t1bar" style="width:50%"></div>
        <div class="ticket-fill-red"  id="t2bar" style="width:50%"></div>
      </div>
      <span class="ticket-num red" id="t2num">—</span>
    </div>
    <div class="hud-block">
      <span class="status-text" id="statusText">Conectando...</span>
    </div>
  </div>

  <div id="body">
    <div id="mapwrap">
      <div id="map"></div>
      <div id="sweep"></div>
    </div>
    <div id="side">
      <div>
        <div class="panel-title">Jugador seleccionado</div>
        <div id="playerPanel"><div class="no-data">Hover sobre un ícono</div></div>
      </div>
      <div>
        <div class="panel-title">En mapa (<span id="playerCount">0</span>)</div>
        <div id="playerList"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const WORKER_URL = 'https://squadpanel-worker.latamcompanysquad.workers.dev';
const POLL_MS    = 2000;
const MAP_UNITS  = 1000; // espacio virtual Leaflet

// Corners en Unreal Units (metros × 100) extraídos de SquadCalc
// corner0 = MIN (esquina inferior-izquierda), corner1 = MAX (esquina superior-derecha)
const MAP_CORNERS = {
  'albasrah':     { c0:[-200000,-200000], c1:[200000,200000] },
  'anvil':        { c0:[-204000,-204000], c1:[102000,102000] },
  'blackcoast':   { c0:[-229900,-212700], c1:[229900,247200] },
  'chora':        { c0:[-246400,-266400], c1:[160000,140000] },
  'fallujah':     { c0:[-131500,-154500], c1:[169000,146000] },
  'foolsroad':    { c0:[-132600,-132600], c1:[ 44800, 44800] },
  'goosebay':     { c0:[-201600,-201600], c1:[201500,201500] },
  'gorodok':      { c0:[-203200,-203200], c1:[203200,203200] },
  'harju':        { c0:[-201600,-201600], c1:[201600,201600] },
  'jensen':       { c0:[-200400,-200400], c1:[200400,200400] },
  'kamdesh':      { c0:[-201600,-201600], c1:[201600,201600] },
  'kohat':        { c0:[-230000,-230000], c1:[231700,231700] },
  'kokan':        { c0:[-107600,-107600], c1:[142000,142000] },
  'lashkar':      { c0:[-216700,-216700], c1:[216700,216700] },
  'logar':        { c0:[ -88100,-113200], c1:[ 88000, 62900] },
  'manicouagan':  { c0:[-201600,-201600], c1:[201500,201500] },
  'mestia':       { c0:[-120000,-110000], c1:[120000,130000] },
  'mutaha':       { c0:[ -93500,-114000], c1:[182000,161500] },
  'narva':        { c0:[-139000,-140200], c1:[141000,139800] },
  'pacific':      { c0:[-201600,-201600], c1:[201600,201600] },
  'sanxian':      { c0:[-230000,-205000], c1:[230000,255000] },
  'skorpo':       { c0:[-361100,-329300], c1:[323800,357600] },
  'sumari':       { c0:[ -64000, -44700], c1:[ 66000, 85300] },
  'tallil':       { c0:[-234000,-234000], c1:[234000,234000] },
  'yehorivka':    { c0:[-330200,-330200], c1:[304800,304800] },
};

// Normaliza el nombre del mapa del servidor al key del diccionario
function normalizeMapName(raw) {
  if (!raw) return null;
  const s = raw.toLowerCase()
    .replace(/[^a-z]/g, '')
    .replace('jensensrange', 'jensen')
    .replace('jensens', 'jensen')
    .replace('albasrah', 'albasrah')
    .replace('blackcoast', 'blackcoast')
    .replace('foolsroad', 'foolsroad')
    .replace('goosebay', 'goosebay');
  // Match parcial
  for (const key of Object.keys(MAP_CORNERS)) {
    if (s.includes(key) || key.includes(s)) return key;
  }
  return null;
}

// ── LEAFLET SETUP ─────────────────────────────────────────────────────────────
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4,
  zoomSnap: 0.5,
  attributionControl: false,
});

const bounds = [[0,0],[MAP_UNITS,MAP_UNITS]];
map.fitBounds(bounds);

let basemapLayer = null;
let currentMapKey = null;

function loadBasemap(mapKey) {
  if (mapKey === currentMapKey) return;
  currentMapKey = mapKey;
  if (basemapLayer) map.removeLayer(basemapLayer);
  const url = `maps/${mapKey}.webp`;
  basemapLayer = L.imageOverlay(url, bounds).addTo(map);
  basemapLayer.bringToBack();
  map.fitBounds(bounds);
}

// ── COORD TRANSFORM ───────────────────────────────────────────────────────────
// Convierte posición Unreal Units → [lat, lng] de Leaflet (CRS.Simple)
// corner0 = MIN, corner1 = MAX
function gameToLatLng(pos, corners) {
  const { c0, c1 } = corners;
  const fracX = (pos.x - c0[0]) / (c1[0] - c0[0]);
  const fracY = (pos.y - c0[1]) / (c1[1] - c0[1]);
  const px = (1 - fracX) * MAP_UNITS; // invertir X
  const py = fracY * MAP_UNITS;
  return [py, px];
}

// ── ICONOS SVG ────────────────────────────────────────────────────────────────
function makeIcon(teamID, isVehicle) {
  const color = teamID === 1 ? '#4fa6e8' : '#e0584f';
  const svg = isVehicle
    ? `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">
        <rect x="3" y="7" width="16" height="10" rx="2" fill="${color}" opacity=".9"/>
        <rect x="7" y="4" width="8" height="5" rx="1" fill="${color}"/>
        <circle cx="6"  cy="18" r="2.5" fill="#222"/>
        <circle cx="16" cy="18" r="2.5" fill="#222"/>
       </svg>`
    : `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
        <circle cx="10" cy="10" r="8" fill="${color}" opacity=".9" stroke="#000" stroke-width="1"/>
        <line x1="10" y1="2" x2="10" y2="18" stroke="#000" stroke-width="1.5"/>
        <line x1="2"  y1="10" x2="18" y2="10" stroke="#000" stroke-width="1.5"/>
       </svg>`;
  return L.divIcon({ html: svg, iconSize:[22,22], iconAnchor:[11,11], className:'' });
}

// ── MARCADORES ────────────────────────────────────────────────────────────────
const markers = {}; // steamID → L.marker

function updateMarkers(players, corners) {
  const seen = new Set();

  for (const p of players) {
    if (!p.position || !p.isAlive) continue;
    seen.add(p.steamID);
    const ll = gameToLatLng(p.position, corners);
    const icon = makeIcon(p.teamID, !!p.vehicle);

    if (markers[p.steamID]) {
      markers[p.steamID].setLatLng(ll).setIcon(icon);
    } else {
      const m = L.marker(ll, { icon }).addTo(map);
      m.on('mouseover', () => showPlayerCard(p));
      markers[p.steamID] = m;
    }
    // Actualizar tooltip con nombre
    markers[p.steamID].bindTooltip(p.name, { permanent:false, direction:'top', offset:[0,-12] });
    // Guardar data para hover
    markers[p.steamID]._playerData = p;
    markers[p.steamID].on('mouseover', () => showPlayerCard(markers[p.steamID]._playerData));
  }

  // Remover marcadores de jugadores que ya no están
  for (const id of Object.keys(markers)) {
    if (!seen.has(id)) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }
  }
}

// ── SIDE PANEL ────────────────────────────────────────────────────────────────
function showPlayerCard(p) {
  const teamColor = p.teamID === 1 ? 'blue' : 'red';
  const teamLabel = p.teamID === 1 ? 'T1' : 'T2';
  document.getElementById('playerPanel').innerHTML = `
    <div class="player-card">
      <div class="pname"><span class="ptag ${teamColor}">[${teamLabel}]</span> ${esc(p.name)}</div>
      <div class="row"><span>Estado</span><span class="val">${p.isAlive ? (p.vehicle ? '🚗 Vehículo' : '🚶 A pie') : '💀 Muerto'}</span></div>
      <div class="row"><span>Rol</span><span class="val">${esc(p.role ?? '—')}</span></div>
      ${p.vehicle ? `<div class="row"><span>Vehículo</span><span class="val">${esc(p.vehicle)}</span></div>` : ''}
      <div class="row"><span>Squad</span><span class="val">${p.squadID ?? '—'}</span></div>
    </div>`;
}

function updatePlayerList(players) {
  document.getElementById('playerCount').textContent = players.filter(p=>p.isAlive).length;
  const list = document.getElementById('playerList');
  const alive = players.filter(p => p.isAlive && p.position);
  if (!alive.length) {
    list.innerHTML = '<div class="no-data">Sin jugadores en mapa</div>';
    return;
  }
  list.innerHTML = alive.map(p => {
    const c = p.teamID === 1 ? 'blue' : 'red';
    return `<div class="player-card" style="cursor:pointer;margin-bottom:6px" onclick="">
      <span class="ptag ${c}">[T${p.teamID}]</span> ${esc(p.name)}
      ${p.vehicle ? '<span style="color:var(--amber)"> ▲</span>' : ''}
    </div>`;
  }).join('');
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD(data) {
  const dot = document.getElementById('liveDot');
  const isLive = data.live && data.players !== undefined;
  dot.className = 'live-dot' + (isLive ? '' : ' offline');

  document.getElementById('hudMap').textContent =
    data.layer && data.layer !== 'Unknown' ? data.layer : (data.map || '—');

  const t1 = data.tickets?.team1;
  const t2 = data.tickets?.team2;
  const ticketsEl = document.getElementById('hudTickets');
  if (t1 !== null && t2 !== null && t1 !== undefined && t2 !== undefined) {
    ticketsEl.style.display = 'flex';
    const total = t1 + t2 || 1;
    document.getElementById('t1num').textContent = t1;
    document.getElementById('t2num').textContent = t2;
    document.getElementById('t1bar').style.width = (t1/total*100) + '%';
    document.getElementById('t2bar').style.width = (t2/total*100) + '%';
  } else {
    ticketsEl.style.display = 'none';
  }

  const ago = data.ts ? Math.round((Date.now() - data.ts) / 1000) : null;
  document.getElementById('statusText').textContent =
    ago !== null ? `hace ${ago}s` : 'Sin datos';
}

// ── POLL ──────────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const res  = await fetch(`${WORKER_URL}/api/match`);
    const data = await res.json();

    updateHUD(data);

    // Resolver corners: primero los que vienen del plugin, si no del diccionario
    let corners = null;
    if (data.cornerZero && data.cornerOne) {
      // Plugin mandó corners (Unreal Units, cornerZero=MAX, cornerOne=MIN)
      corners = { c0: data.cornerOne, c1: data.cornerZero };
    } else {
      const key = normalizeMapName(data.map);
      if (key && MAP_CORNERS[key]) corners = MAP_CORNERS[key];
    }

    // Cargar basemap
    const mapKey = normalizeMapName(data.map);
    if (mapKey) loadBasemap(mapKey);

    // Actualizar marcadores solo si tenemos corners
    if (corners && data.players?.length) {
      updateMarkers(data.players, corners);
    } else if (!data.players?.length) {
      // Limpiar marcadores si no hay jugadores
      for (const id of Object.keys(markers)) {
        map.removeLayer(markers[id]);
        delete markers[id];
      }
    }

    updatePlayerList(data.players ?? []);

  } catch(e) {
    document.getElementById('statusText').textContent = 'Error de conexión';
    document.getElementById('liveDot').className = 'live-dot offline';
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Arrancar
poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
