<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LATAMCOMPANY — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Oswald', 'JetBrains Mono', monospace;
      background: linear-gradient(135deg, #0a0e08 0%, #1a2218 100%);
      color: #e8f5e9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      background: rgba(11, 15, 12, 0.95);
      border: 1px solid #2d5a2d;
      border-radius: 8px;
      padding: 40px;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      text-align: center;
    }
    .logo {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }
    .logo span {
      color: #4caf50;
    }
    .subtitle {
      color: #90ee90;
      font-size: 12px;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
      font-family: 'Oswald', sans-serif;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(88, 101, 242, 0.4);
    }
    .discord-icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    .info {
      font-size: 11px;
      color: #90ee90;
      margin-top: 30px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">LATAM<span>COMPANY</span></div>
    <div class="subtitle">Live Tactical Map — Staff Only</div>
    
    <button class="login-btn" onclick="loginWithDiscord()">
      <svg class="discord-icon" viewBox="0 0 24 24">
  <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.211.375-.445.865-.607 1.252a18.27 18.27 0 0 0-5.487 0c-.162-.387-.395-.877-.607-1.252a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.042-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.294.075.075 0 0 1 .078-.01c3.928 1.793 8.18 1.793 12.062 0a.075.075 0 0 1 .079.009c.12.098.246.198.373.295a.077.077 0 0 1-.007.127 12.299 12.299 0 0 1-1.873.892.076.076 0 0 0-.041.107c.352.699.764 1.365 1.226 1.994a.078.078 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.056c.5-4.506.92-9.04.079-13.617a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-.965-2.157-2.156 0-1.193.93-2.157 2.157-2.157 1.226 0 2.157.964 2.157 2.157 0 1.19-.93 2.155-2.157 2.155zm7.975 0c-1.183 0-2.157-.965-2.157-2.156 0-1.193.93-2.157 2.157-2.157 1.226 0 2.157.964 2.157 2.157 0 1.19-.931 2.155-2.157 2.155z"/>
</svg>
      Inicia sesión con Discord
    </button>
    
    <div class="info">
      Solo staff de LATAMCOMPANY puede acceder.<br>
      Se requieren permisos de Moderador o superior.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
</body>
</html>
